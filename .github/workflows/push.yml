name: push-workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file for tests
        run: |
          echo "DATABASE_HOST=db" > .env
          echo "DATABASE_NAME=postgres" >> .env
          echo "DATABASE_USERNAME=postgres" >> .env
          echo "DATABASE_PASSWORD=password" >> .env

      - name: Build image
        run: docker compose -f docker-compose.yml build app

      - name: Run tests
        run: docker compose -f docker-compose.yml up --abort-on-container-exit --exit-code-from app

      - name: Push image
        run: docker compose -f docker-compose.yml push app